# version: "3.9"

services:
  qdrant:
    image: qdrant/qdrant:v1.15.4
    container_name: nyayai-qdrant
    restart: unless-stopped

    ports:
      - "6333:6333"
      - "6334:6334"

    volumes:
      - ./data/qdrant:/qdrant/storage

  redis:
    image: redis:7-alpine
    container_name: nyayai-redis
    restart: unless-stopped

    ports:
      - "6379:6379"

    volumes:
      - ./data/redis:/data